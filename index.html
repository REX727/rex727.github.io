<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GXP</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px; /* Small padding for slight spacing */
      font-family: RohnRounded-Medium;
      background-color: #222222;
      color: #ffffff;
      box-sizing: border-box; /* Include padding in total dimensions */
    }

    #time-block {
      text-align: center; /* Center-align content */
    }

    #time {
      font-size: 22rem; /* Maximize font size for large display */
      font-weight: bold;
      margin: 0;
      line-height: 1; /* Reduce line height for tighter spacing */
    }

    #subtitle {
      font-size: 7rem; /* Increase subtitle font size */
      font-weight: bold;
      margin-top: 10px; /* Slight space between time and subtitle */
    }

    /* Responsiveness for smaller screens */
    @media (max-width: 768px) {
      #time {
        font-size: 12rem; /* Scale down font for smaller devices */
      }

      #subtitle {
        font-size: 4rem;
      }
    }

    @media (max-width: 480px) {
      #time {
        font-size: 8rem; /* Further reduce font size for very small screens */
      }

      #subtitle {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div id="time-block">
    <div id="time"></div>
    <div id="subtitle"></div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      // Time
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${hours}:${minutes}`;

      // Date (without year)
      const month = String(now.getMonth() + 1).padStart(2, '0'); // Months are 0-based
      const date = String(now.getDate()).padStart(2, '0');
      const day = ['SUN.', 'MON.', 'TUE.', 'WED.', 'THU.', 'FRI.', 'SAT.'][now.getDay()];
      
      document.getElementById('subtitle').textContent = `${month}.${date} ${day}`; // Display month and day only
    }

    // Update the time and subtitle every second
    setInterval(updateTime, 1000);

    // Initialize immediately
    updateTime();
  </script>
</body>
</html>
