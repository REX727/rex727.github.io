<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GX Panel</title>
  <style>
    body {
      display: flex;
      justify-content: flex-end; /* Align content to the right */
      align-items: flex-end; /* Align content to the bottom */
      height: 100vh;
      margin: 0;
      font-family: RohnRounded-Medium, Arial, sans-serif;
      background-color: #1f1f1f;
      color: #d0d0d0;
    }

    #time-block {
      text-align: right; /* Align text within the block to the right */
      margin: 2rem; /* Add smaller spacing from the edges */
    }

    #time {
      font-size: 17rem; /* Smaller font size for the time */
      font-weight: bold;
      margin: 0;
    }

    #subtitle {
      font-size: 6rem; /* Smaller font size for the subtitle */
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="time-block">
    <div id="time"></div>
    <div id="subtitle"></div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      // Time
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${hours}:${minutes}`;

      // Date (without year)
      const month = String(now.getMonth() + 1).padStart(2, '0'); // Months are 0-based
      const date = String(now.getDate()).padStart(2, '0');
      const day = ['SUN.', 'MON.', 'TUE.', 'WED.', 'THU.', 'FRI.', 'SAT.'][now.getDay()];
      
      document.getElementById('subtitle').textContent = `${month}.${date} ${day}`; // Display month and day only
    }

    // Update the time and subtitle every second
    setInterval(updateTime, 1000);

    // Initialize immediately
    updateTime();
  </script>
</body>
</html>
